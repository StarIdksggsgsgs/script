<!DOCTYPE html>
<html>
<head>
    <title>Script.lua</title>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: monospace;
            padding: 10px;
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

<pre id="output"></pre>

<script>
fetch("https://pastefy.app/LtudCVs3/raw") // put your link here
    .then(res => res.text())
    .then(text => {
        document.getElementById("output").textContent = text;
    })
    .catch(err => {
        document.getElementById("output").textContent = "Error: " + err;
    });
</script>

</body>
</html>
